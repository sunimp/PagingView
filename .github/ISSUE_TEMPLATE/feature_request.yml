name: Feature Request
description: 提交功能建议或 API 改进建议
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 你遇到的问题
      description: 说明当前能力缺口或使用痛点
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 期望方案
      description: 说明你希望新增的能力、API 设计或交互方式
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 如果你尝试过其他做法，也请一并说明

  - type: textarea
    id: impact
    attributes:
      label: 影响范围
      description: 请说明这项能力主要影响 UIKit、SwiftUI，还是两者都会影响
